repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        files: ^(src/pynxtools_em|tests)/.*\.py$
      - id: ruff-format
        files: ^(src/pynxtools_em|tests)/.*\.py$


  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy  # static type checking
        # mypy . --install-types --non-interactive then pip freeze | grep types- to see what to add
        additional_dependencies:
          - types-pytz
          - types-PyYAML
          - types-requests

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py310-plus]  # modernizes syntax for Python 3.10+

  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout  # removes notebook outputs before committing

  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v9.8.0
    hooks:
      - id: cspell  # spellchecking
        pass_filenames: false
        args:
          - --config
          - cspell.json
          - README.md
          - CITATION.cff
          - docs/**/*
          - src/pynxtools_em/**/*.py
          - tests/**/*.py
